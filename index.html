<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 健康紀錄追蹤器</title>
    <!-- 使用 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <!-- 標題區域 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">BMI 健康紀錄</h1>
            <p class="text-gray-600">追蹤您的身體質量指數，守護健康生活</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- 左側：輸入表單 -->
            <div class="glass-card p-8 rounded-3xl shadow-xl">
                <h2 class="text-2xl font-semibold text-blue-600 mb-6 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                    數值輸入
                </h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">身高 (cm)</label>
                        <input type="number" id="height" placeholder="例如: 175" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition duration-200">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">體重 (kg)</label>
                        <input type="number" id="weight" placeholder="例如: 70" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition duration-200">
                    </div>
                    <button onclick="calculateBMI()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transform hover:-translate-y-1 transition duration-200">
                        計算並紀錄
                    </button>
                </div>

                <!-- 計算結果顯示區 -->
                <div id="resultArea" class="hidden mt-8 p-6 rounded-2xl border-2 border-blue-50 bg-blue-50/50">
                    <div class="text-center">
                        <span class="text-sm text-gray-500 uppercase font-tracking-widest">您的 BMI 為</span>
                        <div id="bmiValue" class="text-5xl font-black text-blue-600 my-2">22.5</div>
                        <div id="bmiCategory" class="inline-block px-4 py-1 rounded-full text-sm font-semibold mb-4">體重正常</div>
                        <p id="bmiAdvice" class="text-sm text-gray-600 italic"></p>
                    </div>
                </div>
            </div>

            <!-- 右側：歷史紀錄 -->
            <div class="glass-card p-8 rounded-3xl shadow-xl flex flex-col h-full">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        紀錄歷史
                    </h2>
                    <button onclick="clearAllHistory()" class="text-sm text-red-500 hover:underline">清空全部</button>
                </div>

                <div id="historyList" class="space-y-3 overflow-y-auto max-h-[450px] pr-2">
                    <!-- 歷史項目會在這裡動態生成 -->
                    <div class="text-center py-10 text-gray-400 italic">
                        尚無紀錄，開始計算您的第一個 BMI 吧！
                    </div>
                </div>
            </div>

        </div>

        <!-- 頁尾資訊 -->
        <footer class="mt-12 text-center text-gray-500 text-sm">
            <p>© 2024 BMI Tracker • 資料儲存於您的本機瀏覽器中</p>
        </footer>
    </div>

    <script>
        // 初始化載入
        document.addEventListener('DOMContentLoaded', () => {
            renderHistory();
        });

        // 計算 BMI 的核心函數
        function calculateBMI() {
            const heightInput = document.getElementById('height');
            const weightInput = document.getElementById('weight');
            const height = parseFloat(heightInput.value);
            const weight = parseFloat(weightInput.value);

            if (!height || !weight || height <= 0 || weight <= 0) {
                alert("請輸入正確的身高與體重！");
                return;
            }

            // BMI = 體重(kg) / (身高(m) * 身高(m))
            const heightInMeters = height / 100;
            const bmi = (weight / (heightInMeters * heightInMeters)).toFixed(1);
            
            const category = getBMICategory(bmi);
            const info = getBMIAdvice(category);

            // 更新 UI
            const resultArea = document.getElementById('resultArea');
            const bmiDisplay = document.getElementById('bmiValue');
            const categoryDisplay = document.getElementById('bmiCategory');
            const adviceDisplay = document.getElementById('bmiAdvice');

            resultArea.classList.remove('hidden');
            bmiDisplay.innerText = bmi;
            categoryDisplay.innerText = category.label;
            
            // 根據類別設置顏色
            categoryDisplay.className = `inline-block px-4 py-1 rounded-full text-sm font-semibold mb-4 ${category.color}`;
            adviceDisplay.innerText = info;

            // 儲存到 LocalStorage
            saveToHistory(height, weight, bmi, category.label);
            
            // 清空輸入
            // heightInput.value = '';
            // weightInput.value = '';
        }

        // 判斷 BMI 類別
        function getBMICategory(bmi) {
            if (bmi < 18.5) return { label: '體重過輕', color: 'bg-yellow-100 text-yellow-700' };
            if (bmi < 24) return { label: '體重正常', color: 'bg-green-100 text-green-700' };
            if (bmi < 27) return { label: '過重', color: 'bg-orange-100 text-orange-700' };
            if (bmi < 30) return { label: '輕度肥胖', color: 'bg-red-100 text-red-600' };
            if (bmi < 35) return { label: '中度肥胖', color: 'bg-red-200 text-red-700' };
            return { label: '重度肥胖', color: 'bg-red-600 text-white' };
        }

        // 根據類別給予建議
        function getBMIAdvice(category) {
            const advices = {
                '體重過輕': "您的體重偏輕，建議均衡飲食，增加營養攝取。",
                '體重正常': "太棒了！請繼續保持均衡飲食與運動習慣。",
                '過重': "體重稍微偏高囉，建議適量增加運動並注意熱量攝取。",
                '輕度肥胖': "建議規劃規律運動，並諮詢營養師調整飲食結構。",
                '中度肥胖': "為了健康，建議開始積極進行體重管理，減少精緻澱粉。",
                '重度肥胖': "建議尋求專業醫療諮詢，系統化改善生活與飲食習慣。"
            };
            return advices[category.label];
        }

        // LocalStorage 操作：儲存
        function saveToHistory(h, w, bmi, cat) {
            const history = JSON.parse(localStorage.getItem('bmi_history') || '[]');
            const newRecord = {
                id: Date.now(),
                date: new Date().toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
                height: h,
                weight: w,
                bmi: bmi,
                category: cat
            };
            history.unshift(newRecord); // 加入到開頭
            localStorage.setItem('bmi_history', JSON.stringify(history));
            renderHistory();
        }

        // LocalStorage 操作：刪除單筆
        function deleteRecord(id) {
            let history = JSON.parse(localStorage.getItem('bmi_history') || '[]');
            history = history.filter(item => item.id !== id);
            localStorage.setItem('bmi_history', JSON.stringify(history));
            renderHistory();
        }

        // LocalStorage 操作：清空
        function clearAllHistory() {
            if (confirm("確定要刪除所有歷史紀錄嗎？此動作無法復原。")) {
                localStorage.removeItem('bmi_history');
                renderHistory();
            }
        }

        // 渲染歷史列表
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('bmi_history') || '[]');

            if (history.length === 0) {
                historyList.innerHTML = `<div class="text-center py-10 text-gray-400 italic">尚無紀錄，開始計算您的第一個 BMI 吧！</div>`;
                return;
            }

            historyList.innerHTML = history.map(item => {
                const catData = getBMICategory(parseFloat(item.bmi));
                return `
                <div class="flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition duration-200">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs text-gray-400">${item.date}</span>
                            <span class="text-[10px] px-2 py-0.5 rounded-full ${catData.color}">${item.category}</span>
                        </div>
                        <div class="flex items-baseline gap-4">
                            <div class="text-xl font-bold text-gray-700">${item.bmi} <span class="text-xs font-normal text-gray-400">BMI</span></div>
                            <div class="text-sm text-gray-500">${item.height}cm / ${item.weight}kg</div>
                        </div>
                    </div>
                    <button onclick="deleteRecord(${item.id})" class="p-2 text-gray-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
